<div class="min-h-screen flex justify-center items-center bg-gray-100">

  <div class="bg-white p-8 rounded-xl shadow w-full max-w-xl">

    <h2 class="text-2xl font-bold mb-6 text-blue-900">
      Solicitar servicio
    </h2>

    <input [(ngModel)]="form.nombre" placeholder="Nombre"
      class="w-full border p-2 mb-3 rounded">

    <input [(ngModel)]="form.correo" placeholder="Correo"
      class="w-full border p-2 mb-3 rounded">

    <input [(ngModel)]="form.area" placeholder="Área (Redes, Telecom, etc)"
      class="w-full border p-2 mb-3 rounded">

    <textarea [(ngModel)]="form.detalle" placeholder="Detalle del servicio"
      class="w-full border p-2 mb-3 rounded"></textarea>

    <button
      (click)="enviar()"
      [disabled]="!form.nombre || !form.correo || !form.area || !form.detalle"
      class="bg-blue-900 text-white px-4 py-2 rounded w-full disabled:opacity-50"
    >
      Enviar solicitud
    </button>

  </div>

</div>
