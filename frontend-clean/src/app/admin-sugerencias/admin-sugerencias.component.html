<div class="min-h-screen bg-gray-100 p-8">

  <h1 class="text-3xl font-bold text-blue-900 mb-6">
    Administración de Sugerencias
  </h1>

  <div class="bg-white rounded-xl shadow p-6">

    <div class="flex gap-3 mb-4">
      <button type="button"
              (click)="abrirPdf()"
              class="bg-red-700 text-white px-4 py-2 rounded-lg">
        Reporte PDF
      </button>

      <button type="button"
              (click)="abrirExcel()"
              class="bg-green-700 text-white px-4 py-2 rounded-lg">
        Reporte Excel
      </button>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full border">
        <thead class="bg-blue-900 text-white">
          <tr>
            <th class="p-2">ID</th>
            <th class="p-2">Nombre</th>
            <th class="p-2">Correo</th>
            <th class="p-2">Mensaje</th>
            <th class="p-2">Estatus</th>
            <th class="p-2">Fecha</th>
            <th class="p-2">Acciones</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let s of sugerencias" class="border-b">
            <td class="p-2">{{ s.id }}</td>
            <td class="p-2">{{ s.nombre }}</td>
            <td class="p-2">{{ s.correo }}</td>
            <td class="p-2">{{ s.mensaje }}</td>
            <td class="p-2">{{ s.estatus }}</td>
            <td class="p-2">{{ s.fecha | date:'short' }}</td>
            <td class="p-2 flex gap-2">
              <button type="button"
                      (click)="cambiarEstatus(s.id, 'Revisada')"
                      class="bg-yellow-500 text-white px-3 py-1 rounded">
                Revisada
              </button>

              <button type="button"
                      (click)="cambiarEstatus(s.id, 'Pendiente')"
                      class="bg-blue-700 text-white px-3 py-1 rounded">
                Pendiente
              </button>

              <button type="button"
                      (click)="eliminar(s.id)"
                      class="bg-red-600 text-white px-3 py-1 rounded">
                Eliminar
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="flex justify-between items-center mt-4">
      <button type="button"
              (click)="anterior()"
              class="bg-gray-600 text-white px-4 py-2 rounded-lg">
        Anterior
      </button>

      <p class="font-semibold">
        Página {{ pagina + 1 }} | Total: {{ total }}
      </p>

      <button type="button"
              (click)="siguiente()"
              class="bg-gray-600 text-white px-4 py-2 rounded-lg">
        Siguiente
      </button>
    </div>

  </div>

</div>
