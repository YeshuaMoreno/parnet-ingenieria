<div class="min-h-screen bg-gray-100 p-8">

  <div class="flex justify-between items-center mb-8">
    <h1 class="text-3xl font-bold text-blue-900">
      Dashboard ParNet
    </h1>

    <a routerLink="/admin-productos"
       class="bg-blue-900 text-white px-4 py-2 rounded-lg font-semibold">
      Administrar productos
    </a>
  </div>

  <div *ngIf="cargando" class="text-gray-600">
    Cargando datos...
  </div>

  <div *ngIf="!cargando" class="grid grid-cols-1 md:grid-cols-5 gap-4">

    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="font-semibold text-gray-700">Productos</h2>
      <p class="text-3xl font-bold text-blue-800">{{ stats.productos }}</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="font-semibold text-gray-700">Servicios</h2>
      <p class="text-3xl font-bold text-blue-800">{{ stats.servicios }}</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="font-semibold text-gray-700">Sugerencias</h2>
      <p class="text-3xl font-bold text-blue-800">{{ stats.sugerencias }}</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="font-semibold text-gray-700">Noticias</h2>
      <p class="text-3xl font-bold text-blue-800">{{ stats.noticias }}</p>
    </div>

    <div class="bg-white p-6 rounded-xl shadow">
      <h2 class="font-semibold text-gray-700">Visitas</h2>
      <p class="text-3xl font-bold text-blue-800">{{ stats.visitas }}</p>
    </div>

  </div>

</div>
