<div class="min-h-screen bg-gray-100 p-8 flex justify-center">

  <div class="bg-white rounded-xl shadow p-8 w-full max-w-xl">

    <h1 class="text-3xl font-bold text-blue-900 mb-2">
      Sugerencias
    </h1>

    <p class="text-gray-600 mb-6">
      Envía tus comentarios para mejorar el servicio de ParNet Ingeniería.
    </p>

    <form (ngSubmit)="enviar()" class="space-y-4">

      <input [(ngModel)]="sugerencia.nombre"
             name="nombre"
             class="w-full border p-3 rounded-lg"
             placeholder="Nombre">

      <input [(ngModel)]="sugerencia.correo"
             name="correo"
             type="email"
             class="w-full border p-3 rounded-lg"
             placeholder="Correo electrónico">

      <textarea [(ngModel)]="sugerencia.mensaje"
                name="mensaje"
                rows="5"
                class="w-full border p-3 rounded-lg"
                placeholder="Escribe tu sugerencia"></textarea>

      <div class="bg-gray-100 p-4 rounded-lg">
        <p class="font-semibold mb-2">Captcha: escribe 1234</p>

        <input [(ngModel)]="sugerencia.captcha"
               name="captcha"
               class="w-full border p-3 rounded-lg"
               placeholder="Captcha">
      </div>

      <p *ngIf="mensajeExito" class="text-green-700 font-semibold">
        {{ mensajeExito }}
      </p>

      <p *ngIf="error" class="text-red-700 font-semibold">
        {{ error }}
      </p>

      <button class="w-full bg-blue-900 text-white p-3 rounded-lg font-bold">
        Enviar sugerencia
      </button>

    </form>

  </div>

</div>
